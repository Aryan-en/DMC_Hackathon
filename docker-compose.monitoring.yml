version: '3.8'

# Optional monitoring stack - Use with:
# docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# To disable: docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml down

services:
  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: ontora-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    environment:
      - TZ=UTC
    networks:
      - ontora-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:10.2.0
    container_name: ontora-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - ontora-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  ontora-network:
    external: true
    name: ontora_ontora-network
