---
# Nginx Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ontora-ingress
  namespace: ontora
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/set-real-ip-from: "0.0.0.0/0"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.example.com
    secretName: ontora-tls
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ontora-backend
            port:
              number: 80

---
# Network Policy - Restrict traffic to backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ontora-backend-network-policy
  namespace: ontora
spec:
  podSelector:
    matchLabels:
      app: ontora-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - podSelector:
        matchLabels:
          app: ontora-backend
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: ontora-postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow to Neo4j
  - to:
    - podSelector:
        matchLabels:
          app: ontora-neo4j
    ports:
    - protocol: TCP
      port: 7687
  # Allow to Redis
  - to:
    - podSelector:
        matchLabels:
          app: ontora-redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow external HTTPS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Network Policy - Restrict traffic to databases
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ontora-postgres-network-policy
  namespace: ontora
spec:
  podSelector:
    matchLabels:
      app: ontora-postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ontora-backend
    ports:
    - protocol: TCP
      port: 5432

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ontora-neo4j-network-policy
  namespace: ontora
spec:
  podSelector:
    matchLabels:
      app: ontora-neo4j
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ontora-backend
    ports:
    - protocol: TCP
      port: 7687

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ontora-redis-network-policy
  namespace: ontora
spec:
  podSelector:
    matchLabels:
      app: ontora-redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ontora-backend
    ports:
    - protocol: TCP
      port: 6379

---
# Pod Security Policy
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: ontora-restricted
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
  - ALL
  allowedCapabilities: []
  volumes:
  - 'configMap'
  - 'emptyDir'
  - 'projected'
  - 'secret'
  - 'downwardAPI'
  - 'persistentVolumeClaim'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'MustRunAs'
  supplementalGroups:
    rule: 'MustRunAs'
  fsGroup:
    rule: 'MustRunAs'
  readOnlyRootFilesystem: false

---
# Role for Pod Security Policy
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ontora-psp-user
rules:
- apiGroups: ['policy']
  resources: ['podsecuritypolicies']
  verbs: ['use']
  resourceNames:
  - ontora-restricted

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ontora-psp-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ontora-psp-user
subjects:
- kind: ServiceAccount
  name: ontora-backend
  namespace: ontora
